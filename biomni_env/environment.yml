name: biomni_e1
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pip
  - openpyxl

  # ── Bioinformatics CLI tools (formerly bio_env.yml) ──
  - blast
  - samtools
  - bowtie2
  - bwa
  - bedtools
  - fastqc
  - trimmomatic
  - mafft
  - gseapy
  - mageck
  - plannotate

  # ── R ecosystem (formerly r_packages.yml + install_r_packages.R) ──
  - r-base>=4.4
  - r-essentials
  - r-png
  - r-pheatmap
  - r-devtools
  - r-remotes
  - r-wgcna
  - bioconductor-deseq2
  - bioconductor-dada2
  - bioconductor-edger
  - bioconductor-limma
  - bioconductor-flowcore
  - bioconductor-xcms
  - bioconductor-clusterprofiler

  - pip:
      # Core scientific stack
      - numpy==2.1
      - pandas
      - matplotlib
      - scipy
      - statsmodels
      - scikit-learn
      - seaborn
      - networkx

      # LLM / Agent / UI
      - gradio==5.39.0
      - gradio-client==1.11.0
      - langchain
      - langgraph==0.3.18
      - langchain-openai
      - langchain-anthropic
      - langchain-ollama
      - langchain-community
      - openai

      # Web / Parsing
      - beautifulsoup4
      - lxml
      - requests
      - pyyaml
      - googlesearch-python
      - PyPDF2

      # Jupyter
      - jupyter
      - notebook
      - ipykernel

      # ML / NLP
      - transformers
      - huggingface-hub
      - sentencepiece
      - faiss-cpu

      # Utilities
      - tqdm
      - packaging>=23.2.0,<26.0
      - python-dotenv
      - pytest
      - mcp
      - tooluniverse

      # Bioinformatics Python packages (formerly bio_env.yml)
      - scanpy
      - biopython
      - biopandas
      - biotite
      - opencv-python
      - rdkit
      - macs2
      - pymc3
      - cryosparc-tools
      - lifelines
      - scikit-image
      - gget
      - cellxgene-census
      - scikit-bio
      - pymed
      - arxiv
      - scholarly
      - umap-learn
      - scrublet
      - scvelo
      - scvi-tools
      - harmony-pytorch
      - pyliftover
      - pytdc==0.4.0
      - pysam
      - pyfaidx
      - pyranges
      - pybedtools
      - openmm
      - pystan
      - igraph
      - pyscenic
      - cooler
      - trackpy
      - flowcytometrytools
      - cellpose
      - viennarna
      - PyMassSpec
      - python-libsbml
      - cobra
      - reportlab
      - hmmlearn
      - msprime
      - tskit
      - cyvcf2
      - pykalman
      - community
      - fanc
